<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Result Analyzer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .card h2 {
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 3px solid #667eea;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: 600;
            color: #555;
            margin-bottom: 5px;
            font-size: 0.9rem;
        }

        input[type="text"],
        input[type="number"] {
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="number"]:focus {
            outline: none;
            border-color: #667eea;
        }

        input:invalid {
            border-color: #e74c3c;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
            margin-right: 10px;
            margin-bottom: 10px;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        .btn-success:hover {
            background: #218838;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-danger:hover {
            background: #c82333;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
            align-items: center;
        }

        .controls label {
            margin-right: 10px;
        }

        select {
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            overflow-x: auto;
            display: block;
        }

        thead {
            background: #667eea;
            color: white;
        }

        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        th {
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }

        tbody tr:hover {
            background: #f8f9fa;
        }

        .status-pass {
            color: #28a745;
            font-weight: bold;
        }

        .status-fail {
            color: #dc3545;
            font-weight: bold;
        }

        .status-topper {
            color: #ffd700;
            font-weight: bold;
            text-shadow: 0 0 1px rgba(0,0,0,0.3);
        }

        .analytics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-card h3 {
            font-size: 2rem;
            margin-bottom: 5px;
        }

        .stat-card p {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .error {
            color: #dc3545;
            font-size: 0.85rem;
            margin-top: 5px;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .controls {
                flex-direction: column;
                align-items: stretch;
            }

            table {
                font-size: 0.85rem;
            }

            th, td {
                padding: 10px 8px;
            }

            .analytics-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 480px) {
            .analytics-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Student Result Analyzer</h1>

        <!-- Student Entry Form -->
        <div class="card">
            <h2>📝 Student Entry System</h2>
            <form id="studentForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="studentName">Student Name</label>
                        <input type="text" id="studentName" required placeholder="Enter name">
                    </div>
                    <div class="form-group">
                        <label for="subject1">Subject 1</label>
                        <input type="number" id="subject1" min="0" max="100" required placeholder="0-100">
                    </div>
                    <div class="form-group">
                        <label for="subject2">Subject 2</label>
                        <input type="number" id="subject2" min="0" max="100" required placeholder="0-100">
                    </div>
                    <div class="form-group">
                        <label for="subject3">Subject 3</label>
                        <input type="number" id="subject3" min="0" max="100" required placeholder="0-100">
                    </div>
                    <div class="form-group">
                        <label for="subject4">Subject 4</label>
                        <input type="number" id="subject4" min="0" max="100" required placeholder="0-100">
                    </div>
                    <div class="form-group">
                        <label for="subject5">Subject 5</label>
                        <input type="number" id="subject5" min="0" max="100" required placeholder="0-100">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary">Add Student</button>
                <p id="errorMsg" class="error"></p>
            </form>
        </div>

        <!-- Controls -->
        <div class="card">
            <h2>🔍 Filter & Sort</h2>
            <div class="controls">
                <label>Filter:</label>
                <select id="filterSelect" onchange="applyFilter()">
                    <option value="all">Show All</option>
                    <option value="pass">Pass Only</option>
                    <option value="fail">Fail Only</option>
                    <option value="top3">Top 3 Students</option>
                </select>
                
                <label style="margin-left: 20px;">Sort By:</label>
                <button class="btn btn-secondary" onclick="sortByMarks()">Marks (High → Low)</button>
                <button class="btn btn-secondary" onclick="sortByName()">Name (A-Z)</button>
            </div>
        </div>

        <!-- Results Table -->
        <div class="card">
            <h2>📋 Results Table</h2>
            <div style="overflow-x: auto;">
                <table id="resultsTable">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Total</th>
                            <th>Average</th>
                            <th>Grade</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr class="empty-state">
                            <td colspan="6">No students added yet. Add students to view results.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Analytics -->
        <div class="card">
            <h2>📈 Class Analytics</h2>
            <div class="analytics-grid">
                <div class="stat-card">
                    <h3 id="classAverage">0</h3>
                    <p>Class Average</p>
                </div>
                <div class="stat-card">
                    <h3 id="highestScore">0</h3>
                    <p>Highest Score</p>
                </div>
                <div class="stat-card">
                    <h3 id="lowestScore">0</h3>
                    <p>Lowest Score</p>
                </div>
                <div class="stat-card">
                    <h3 id="passCount">0</h3>
                    <p>Pass Count</p>
                </div>
                <div class="stat-card">
                    <h3 id="failCount">0</h3>
                    <p>Fail Count</p>
                </div>
                <div class="stat-card">
                    <h3 id="totalStudents">0</h3>
                    <p>Total Students</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Data storage
        let students = [];
        let filteredStudents = [];

        // Form submission
        document.getElementById('studentForm').addEventListener('submit', function(e) {
            e.preventDefault();
            addStudent();
        });

        function addStudent() {
            const name = document.getElementById('studentName').value.trim();
            const marks = [
                parseFloat(document.getElementById('subject1').value),
                parseFloat(document.getElementById('subject2').value),
                parseFloat(document.getElementById('subject3').value),
                parseFloat(document.getElementById('subject4').value),
                parseFloat(document.getElementById('subject5').value)
            ];

            // Validation
            const errorMsg = document.getElementById('errorMsg');
            
            if (!name) {
                errorMsg.textContent = 'Please enter student name';
                return;
            }

            for (let mark of marks) {
                if (isNaN(mark) || mark < 0 || mark > 100) {
                    errorMsg.textContent = 'All marks must be between 0 and 100';
                    return;
                }
            }

            // Calculate results
            const total = marks.reduce((a, b) => a + b, 0);
            const average = total / 5;
            const grade = calculateGrade(average);
            const status = average >= 40 ? 'Pass' : 'Fail';

            const student = {
                id: Date.now(),
                name: name,
                marks: marks,
                total: total,
                average: average,
                grade: grade,
                status: status
            };

            students.push(student);
            filteredStudents = [...students];
            
            // Reset form
            document.getElementById('studentForm').reset();
            errorMsg.textContent = '';
            
            // Update display
            updateDisplay();
        }

        function calculateGrade(average) {
            if (average >= 90) return 'A';
            if (average >= 80) return 'B';
            if (average >= 70) return 'C';
            if (average >= 60) return 'D';
            if (average >= 40) return 'E';
            return 'F';
        }

        function updateDisplay() {
            renderTable();
            updateAnalytics();
        }

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            
            if (filteredStudents.length === 0) {
                tbody.innerHTML = '<tr class="empty-state"><td colspan="6">No students match the current filter.</td></tr>';
                return;
            }

            // Find topper
            const maxTotal = Math.max(...students.map(s => s.total));
            
            tbody.innerHTML = filteredStudents.map(student => {
                const isTopper = student.total === maxTotal && students.length > 0;
                const statusClass = student.status === 'Pass' ? 'status-pass' : 'status-fail';
                const statusText = isTopper ? '⭐ Topper' : student.status;
                const finalClass = isTopper ? 'status-topper' : statusClass;

                return `
                    <tr>
                        <td>${student.name}</td>
                        <td>${student.total}</td>
                        <td>${student.average.toFixed(2)}%</td>
                        <td>${student.grade}</td>
                        <td class="${finalClass}">${statusText}</td>
                        <td>
                            <button class="btn btn-danger" onclick="deleteStudent(${student.id})" style="padding: 5px 10px; font-size: 0.8rem;">Delete</button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function deleteStudent(id) {
            students = students.filter(s => s.id !== id);
            applyFilter();
        }

        function updateAnalytics() {
            if (students.length === 0) {
                document.getElementById('classAverage').textContent = '0';
                document.getElementById('highestScore').textContent = '0';
                document.getElementById('lowestScore').textContent = '0';
                document.getElementById('passCount').textContent = '0';
                document.getElementById('failCount').textContent = '0';
                document.getElementById('totalStudents').textContent = '0';
                return;
            }

            const totals = students.map(s => s.total);
            const classAvg = totals.reduce((a, b) => a + b, 0) / students.length / 5;
            const passCount = students.filter(s => s.status === 'Pass').length;
            const failCount = students.filter(s => s.status === 'Fail').length;

            document.getElementById('classAverage').textContent = classAvg.toFixed(2) + '%';
            document.getElementById('highestScore').textContent = Math.max(...totals);
            document.getElementById('lowestScore').textContent = Math.min(...totals);
            document.getElementById('passCount').textContent = passCount;
            document.getElementById('failCount').textContent = failCount;
            document.getElementById('totalStudents').textContent = students.length;
        }

        function applyFilter() {
            const filter = document.getElementById('filterSelect').value;
            
            switch(filter) {
                case 'all':
                    filteredStudents = [...students];
                    break;
                case 'pass':
                    filteredStudents = students.filter(s => s.status === 'Pass');
                    break;
                case 'fail':
                    filteredStudents = students.filter(s => s.status === 'Fail');
                    break;
                case 'top3':
                    filteredStudents = [...students]
                        .sort((a, b) => b.total - a.total)
                        .slice(0, 3);
                    break;
            }
            
            renderTable();
        }

        function sortByMarks() {
            filteredStudents.sort((a, b) => b.total - a.total);
            renderTable();
        }

        function sortByName() {
            filteredStudents.sort((a, b) => a.name.localeCompare(b.name));
            renderTable();
        }
    </script>
</body>
</html>
