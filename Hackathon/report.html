<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Result Report - Student Result Analyzer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 30px 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .report-card {
            background: #fff;
            border-radius: 16px;
            width: 100%;
            max-width: 650px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.25);
            overflow: hidden;
            animation: fadeUp 0.5s ease;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Header Banner */
        .report-header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            padding: 28px 30px;
            text-align: center;
        }

        .report-header h1 {
            font-size: 1.8rem;
            margin-bottom: 4px;
        }

        .report-header p {
            opacity: 0.85;
            font-size: 0.95rem;
        }

        /* Body */
        .report-body {
            padding: 28px 30px;
        }

        /* Student Info Grid */
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 24px;
        }

        .info-item {
            background: #f8f9ff;
            padding: 12px 16px;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }

        .info-item .label {
            font-size: 0.78rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 2px;
        }

        .info-item .value {
            font-size: 1.05rem;
            font-weight: 700;
            color: #333;
        }

        /* Marks Table */
        .marks-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 24px;
        }

        .marks-table thead {
            background: #667eea;
            color: #fff;
        }

        .marks-table th,
        .marks-table td {
            padding: 13px 16px;
            text-align: left;
        }

        .marks-table th {
            font-size: 0.82rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .marks-table tbody tr {
            border-bottom: 1px solid #f0f0f0;
            transition: background 0.2s;
        }

        .marks-table tbody tr:hover {
            background: #f8f9ff;
        }

        .marks-table .subject-name {
            font-weight: 600;
            color: #333;
        }

        .marks-table .mark-val {
            font-weight: 700;
            font-size: 1.05rem;
        }

        .pass { color: #27ae60; font-weight: 700; }
        .fail { color: #e74c3c; font-weight: 700; }

        /* Progress bar in table */
        .mark-bar {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .bar-track {
            flex: 1;
            height: 8px;
            background: #eee;
            border-radius: 4px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.8s ease;
        }

        .bar-fill.high   { background: #27ae60; }
        .bar-fill.medium { background: #f39c12; }
        .bar-fill.low    { background: #e74c3c; }

        /* Summary Cards */
        .summary-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px;
            margin-bottom: 24px;
        }

        .summary-card {
            text-align: center;
            padding: 18px 12px;
            border-radius: 12px;
            color: #fff;
        }

        .summary-card .num {
            font-size: 1.6rem;
            font-weight: 800;
        }

        .summary-card .lbl {
            font-size: 0.82rem;
            margin-top: 2px;
            opacity: 0.9;
        }

        .bg-total   { background: linear-gradient(135deg, #667eea, #764ba2); }
        .bg-avg     { background: linear-gradient(135deg, #11998e, #38ef7d); }
        .bg-grade   { background: linear-gradient(135deg, #f093fb, #f5576c); }

        /* Overall Result Badge */
        .result-badge {
            text-align: center;
            padding: 18px;
            border-radius: 12px;
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 20px;
        }

        .result-badge.pass-badge {
            background: linear-gradient(135deg, #d4efdf, #a9dfbf);
            color: #1e8449;
            border: 2px solid #27ae60;
        }

        .result-badge.fail-badge {
            background: linear-gradient(135deg, #fadbd8, #f1948a);
            color: #922b21;
            border: 2px solid #e74c3c;
        }

        /* Buttons */
        .btn-row {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 28px;
            border: none;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.2s, box-shadow 0.2s;
            display: inline-block;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(0,0,0,0.15);
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
        }

        .btn-outline {
            background: #fff;
            color: #667eea;
            border: 2px solid #667eea;
        }

        .btn-print {
            background: #2ecc71;
            color: #fff;
        }

        /* No data */
        .no-data {
            text-align: center;
            padding: 60px 30px;
        }

        .no-data .icon { font-size: 4rem; margin-bottom: 14px; }
        .no-data h2 { color: #333; margin-bottom: 10px; }
        .no-data p { color: #888; margin-bottom: 20px; }

        @media print {
            body { background: #fff; padding: 0; }
            .report-card { box-shadow: none; max-width: 100%; }
            .btn-row { display: none; }
        }

        @media (max-width: 500px) {
            .info-grid { grid-template-columns: 1fr; }
            .summary-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="report-card" id="reportCard">
    <!-- Content injected by JS -->
</div>

<script>
    const data = JSON.parse(localStorage.getItem('latestResult'));
    const card = document.getElementById('reportCard');

    if (!data) {
        card.innerHTML = `
            <div class="no-data">
                <div class="icon">📭</div>
                <h2>No Result Found</h2>
                <p>Submit marks from the form to generate a report.</p>
                <a href="forms.html" class="btn btn-primary">Go to Form</a>
            </div>`;
    } else {
        // ——— Helpers ———
        function getGrade(avg) {
            if (avg >= 90) return 'O';
            if (avg >= 80) return 'A+';
            if (avg >= 70) return 'A';
            if (avg >= 60) return 'B+';
            if (avg >= 50) return 'B';
            if (avg >= 40) return 'C';
            return 'F';
        }

        function barClass(mark) {
            if (mark >= 60) return 'high';
            if (mark >= 40) return 'medium';
            return 'low';
        }

        // ——— Compute ———
        const subjects = data.subjects;
        const subjectNames = ['Tamil', 'English', 'Maths', 'Science', 'Social Science'];
        const marks = subjectNames.map(s => subjects[s]);
        const total = data.total;
        const average = data.average;
        const grade = getGrade(average);
        const overallPass = average >= 40;
        const dateStr = new Date(data.date).toLocaleDateString('en-IN', {
            day: '2-digit', month: 'short', year: 'numeric'
        });

        // ——— Build HTML ———
        let tableRows = '';
        for (let i = 0; i < subjectNames.length; i++) {
            const m = marks[i];
            const status = m >= 40 ? 'Pass' : 'Fail';
            const cls = m >= 40 ? 'pass' : 'fail';
            const bc = barClass(m);

            tableRows += `
                <tr>
                    <td class="subject-name">${subjectNames[i]}</td>
                    <td>
                        <div class="mark-bar">
                            <span class="mark-val">${m}</span>
                            <div class="bar-track">
                                <div class="bar-fill ${bc}" style="width:${m}%"></div>
                            </div>
                        </div>
                    </td>
                    <td class="${cls}">${status}</td>
                </tr>`;
        }

        card.innerHTML = `
            <!-- Header -->
            <div class="report-header">
                <h1>📄 Exam Report Card</h1>
                <p>${data.examType} Examination &bull; ${dateStr}</p>
            </div>

            <div class="report-body">

                <!-- Student Info -->
                <div class="info-grid">
                    <div class="info-item">
                        <div class="label">Student ID</div>
                        <div class="value">${data.studentId}</div>
                    </div>
                    <div class="info-item">
                        <div class="label">Student Name</div>
                        <div class="value">${data.studentName}</div>
                    </div>
                    <div class="info-item">
                        <div class="label">Exam Type</div>
                        <div class="value">${data.examType}</div>
                    </div>
                    <div class="info-item">
                        <div class="label">Date</div>
                        <div class="value">${dateStr}</div>
                    </div>
                </div>

                <!-- Marks Table -->
                <table class="marks-table">
                    <thead>
                        <tr>
                            <th>Subject</th>
                            <th>Marks (out of 100)</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${tableRows}
                    </tbody>
                </table>

                <!-- Summary -->
                <div class="summary-row">
                    <div class="summary-card bg-total">
                        <div class="num">${total}/500</div>
                        <div class="lbl">Total Marks</div>
                    </div>
                    <div class="summary-card bg-avg">
                        <div class="num">${average}%</div>
                        <div class="lbl">Average</div>
                    </div>
                    <div class="summary-card bg-grade">
                        <div class="num">${grade}</div>
                        <div class="lbl">Grade</div>
                    </div>
                </div>

                <!-- Overall Badge -->
                <div class="result-badge ${overallPass ? 'pass-badge' : 'fail-badge'}">
                    ${overallPass ? '✅ PASSED' : '❌ FAILED'}
                </div>

                <!-- Buttons -->
                <div class="btn-row">
                    <a href="forms.html" class="btn btn-outline">← Enter New Marks</a>
                    <button class="btn btn-print" onclick="window.print()">🖨 Print Report</button>
                </div>
            </div>`;
    }
</script>

</body>
</html>
