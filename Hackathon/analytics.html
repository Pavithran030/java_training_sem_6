<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics Dashboard - Student Result Analyzer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 960px;
            margin: 0 auto;
        }

        /* Top bar */
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .topbar h1 {
            color: #fff;
            font-size: 1.8rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .topbar-right span {
            color: rgba(255,255,255,0.9);
            font-weight: 600;
        }

        .btn-logout {
            padding: 8px 18px;
            background: rgba(255,255,255,0.2);
            color: #fff;
            border: 2px solid rgba(255,255,255,0.5);
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-logout:hover {
            background: rgba(255,255,255,0.35);
        }

        /* Cards */
        .card {
            background: #fff;
            border-radius: 14px;
            padding: 28px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.18);
        }

        .card h2 {
            color: #333;
            margin-bottom: 18px;
            padding-bottom: 10px;
            border-bottom: 3px solid #667eea;
            font-size: 1.3rem;
        }

        /* Stat cards */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 14px rgba(102,126,234,0.35);
        }

        .stat-card .number {
            font-size: 2rem;
            font-weight: 700;
        }

        .stat-card .label {
            font-size: 0.85rem;
            opacity: 0.9;
            margin-top: 4px;
        }

        /* Filter bar */
        .filter-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }

        .filter-bar label {
            font-weight: 600;
            color: #555;
        }

        .filter-bar select {
            padding: 9px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 0.95rem;
            outline: none;
            cursor: pointer;
            transition: border-color 0.3s;
        }

        .filter-bar select:focus {
            border-color: #667eea;
        }

        /* Table */
        .table-wrap {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead { background: #667eea; color: #fff; }

        th, td {
            padding: 13px 16px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        th {
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 0.5px;
        }

        tbody tr:hover { background: #f8f9fa; }

        .grade-A  { color: #27ae60; font-weight: 700; }
        .grade-B  { color: #2980b9; font-weight: 700; }
        .grade-C  { color: #f39c12; font-weight: 700; }
        .grade-D  { color: #e67e22; font-weight: 700; }
        .grade-F  { color: #e74c3c; font-weight: 700; }

        .pass { color: #27ae60; font-weight: 600; }
        .fail { color: #e74c3c; font-weight: 600; }

        /* Bar chart */
        .chart-container {
            margin-top: 16px;
        }

        .bar-chart {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 20px;
            height: 220px;
            padding: 0 10px;
            margin-top: 10px;
        }

        .bar-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            max-width: 80px;
        }

        .bar {
            width: 100%;
            border-radius: 8px 8px 0 0;
            transition: height 0.6s ease;
            position: relative;
            min-height: 4px;
        }

        .bar-value {
            font-size: 0.82rem;
            font-weight: 700;
            color: #333;
            margin-bottom: 4px;
        }

        .bar-label {
            margin-top: 8px;
            font-size: 0.78rem;
            color: #666;
            font-weight: 600;
            text-align: center;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
            font-size: 1.05rem;
        }

        .empty-state .big-icon {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        /* Comparison section */
        .comparison-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 14px;
        }

        .comp-card {
            border: 2px solid #eee;
            border-radius: 10px;
            padding: 16px;
            text-align: center;
        }

        .comp-card h4 {
            color: #667eea;
            margin-bottom: 8px;
        }

        .comp-card .marks-list {
            text-align: left;
            font-size: 0.9rem;
            color: #555;
        }

        .comp-card .marks-list div {
            padding: 3px 0;
            display: flex;
            justify-content: space-between;
        }

        .comp-card .total-line {
            margin-top: 8px;
            padding-top: 8px;
            border-top: 2px solid #667eea;
            font-weight: 700;
            color: #333;
        }

        .links {
            text-align: center;
            margin-top: 14px;
        }

        .links a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .links a:hover { text-decoration: underline; }

        @media (max-width: 600px) {
            .topbar { flex-direction: column; text-align: center; }
            .stats-row { grid-template-columns: repeat(2, 1fr); }
            .bar-chart { gap: 10px; }
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- Top Bar -->
        <div class="topbar">
            <h1>📊 My Analytics</h1>
            <div class="topbar-right">
                <span id="welcomeMsg">Welcome!</span>
                <button class="btn-logout" onclick="logout()">Logout</button>
            </div>
        </div>

        <!-- Quick Stats -->
        <div class="stats-row" id="statsRow">
            <div class="stat-card">
                <div class="number" id="totalExams">0</div>
                <div class="label">Exams Taken</div>
            </div>
            <div class="stat-card">
                <div class="number" id="bestAvg">0</div>
                <div class="label">Best Average</div>
            </div>
            <div class="stat-card">
                <div class="number" id="overallAvg">0</div>
                <div class="label">Overall Average</div>
            </div>
            <div class="stat-card">
                <div class="number" id="bestGrade">-</div>
                <div class="label">Best Grade</div>
            </div>
        </div>

        <!-- Filter -->
        <div class="card">
            <h2>📋 Exam Results</h2>

            <div class="filter-bar">
                <label>Filter by Exam:</label>
                <select id="examFilter" onchange="renderAll()">
                    <option value="all">All Exams</option>
                    <option value="Quarterly">Quarterly</option>
                    <option value="Half-Yearly">Half-Yearly</option>
                    <option value="Annual">Annual</option>
                </select>
            </div>

            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Exam</th>
                            <th>Tamil</th>
                            <th>English</th>
                            <th>Maths</th>
                            <th>Science</th>
                            <th>Social</th>
                            <th>Total</th>
                            <th>Avg</th>
                            <th>Grade</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="resultsBody"></tbody>
                </table>
            </div>
        </div>

        <!-- Bar Chart -->
        <div class="card">
            <h2>📈 Subject-wise Performance</h2>
            <div class="chart-container">
                <div class="bar-chart" id="barChart"></div>
            </div>
            <p style="text-align:center; color:#aaa; font-size:0.8rem; margin-top:10px;" id="chartNote"></p>
        </div>

        <!-- Exam Comparison -->
        <div class="card">
            <h2>🔄 Exam Comparison</h2>
            <div class="comparison-grid" id="comparisonGrid"></div>
        </div>

        <!-- Links -->
        <div class="card">
            <div class="links">
                <a href="forms.html">📝 Enter New Marks</a> &nbsp; | &nbsp;
                <a href="student_login.html">🔑 Back to Login</a>
            </div>
        </div>

    </div>

    <script>
        // ——— Auth check ———
        const loggedIn = JSON.parse(sessionStorage.getItem('loggedInStudent'));
        if (!loggedIn) {
            window.location.href = 'student_login.html';
        }

        // ——— Globals ———
        let myRecords = [];
        const subjectNames = ['Tamil', 'English', 'Maths', 'Science', 'Social Science'];
        const barColors = ['#667eea', '#764ba2', '#e74c3c', '#2ecc71', '#f39c12'];

        // ——— Init ———
        function init() {
            document.getElementById('welcomeMsg').textContent = 'Welcome, ' + (loggedIn.name || loggedIn.studentId) + '!';

            const allRecords = JSON.parse(localStorage.getItem('studentMarks') || '[]');
            myRecords = allRecords.filter(r => r.studentId === loggedIn.studentId);

            renderAll();
        }

        // ——— Grade helper ———
        function calcGrade(avg) {
            if (avg >= 90) return 'A';
            if (avg >= 80) return 'B';
            if (avg >= 70) return 'C';
            if (avg >= 60) return 'D';
            if (avg >= 40) return 'E';
            return 'F';
        }

        function gradeRank(g) {
            return { A: 6, B: 5, C: 4, D: 3, E: 2, F: 1 }[g] || 0;
        }

        // ——— Render everything ———
        function renderAll() {
            const filter = document.getElementById('examFilter').value;
            const records = filter === 'all' ? myRecords : myRecords.filter(r => r.examType === filter);

            renderStats(records);
            renderTable(records);
            renderBarChart(records);
            renderComparison();
        }

        // ——— Stats ———
        function renderStats(records) {
            document.getElementById('totalExams').textContent = records.length;

            if (records.length === 0) {
                document.getElementById('bestAvg').textContent = '-';
                document.getElementById('overallAvg').textContent = '-';
                document.getElementById('bestGrade').textContent = '-';
                return;
            }

            const avgs = records.map(r => r.average);
            const best = Math.max(...avgs);
            const overall = (avgs.reduce((a, b) => a + b, 0) / avgs.length).toFixed(1);

            document.getElementById('bestAvg').textContent = best + '%';
            document.getElementById('overallAvg').textContent = overall + '%';

            const grades = records.map(r => calcGrade(r.average));
            const bestGrade = grades.reduce((a, b) => gradeRank(a) >= gradeRank(b) ? a : b);
            document.getElementById('bestGrade').textContent = bestGrade;
        }

        // ——— Table ———
        function renderTable(records) {
            const tbody = document.getElementById('resultsBody');

            if (records.length === 0) {
                tbody.innerHTML = '<tr><td colspan="10" class="empty-state"><div class="big-icon">📭</div>No exam records found.<br>Go to <a href="forms.html">Marks Entry</a> to add marks.</td></tr>';
                return;
            }

            tbody.innerHTML = records.map(r => {
                const avg   = r.average;
                const grade = calcGrade(avg);
                const pass  = avg >= 40;
                const subs  = r.subjects;

                return `<tr>
                    <td><strong>${r.examType}</strong></td>
                    <td>${subs.Tamil}</td>
                    <td>${subs.English}</td>
                    <td>${subs.Maths}</td>
                    <td>${subs.Science}</td>
                    <td>${subs['Social Science']}</td>
                    <td><strong>${r.total}</strong></td>
                    <td>${avg}%</td>
                    <td class="grade-${grade}">${grade}</td>
                    <td class="${pass ? 'pass' : 'fail'}">${pass ? 'Pass ✔' : 'Fail ✘'}</td>
                </tr>`;
            }).join('');
        }

        // ——— Bar Chart ———
        function renderBarChart(records) {
            const chart = document.getElementById('barChart');
            const note  = document.getElementById('chartNote');

            if (records.length === 0) {
                chart.innerHTML = '<div class="empty-state">No data to display</div>';
                note.textContent = '';
                return;
            }

            // Average across selected records for each subject
            const avgPerSubject = subjectNames.map(name => {
                const key = name;
                const sum = records.reduce((s, r) => s + (r.subjects[key] || 0), 0);
                return Math.round(sum / records.length);
            });

            const maxMark = 100;
            const maxHeight = 180;

            chart.innerHTML = avgPerSubject.map((val, i) => {
                const height = (val / maxMark) * maxHeight;
                return `
                    <div class="bar-item">
                        <div class="bar-value">${val}</div>
                        <div class="bar" style="height:${height}px; background:${barColors[i]};"></div>
                        <div class="bar-label">${subjectNames[i]}</div>
                    </div>`;
            }).join('');

            note.textContent = records.length === 1
                ? 'Showing marks for 1 exam'
                : 'Showing average across ' + records.length + ' exams';
        }

        // ——— Comparison Cards ———
        function renderComparison() {
            const grid = document.getElementById('comparisonGrid');

            if (myRecords.length === 0) {
                grid.innerHTML = '<div class="empty-state">No exams to compare</div>';
                return;
            }

            grid.innerHTML = myRecords.map(r => {
                const subs = r.subjects;
                const marksHtml = subjectNames.map(name => {
                    return `<div><span>${name}</span><span>${subs[name]}</span></div>`;
                }).join('');

                return `
                    <div class="comp-card">
                        <h4>${r.examType}</h4>
                        <div class="marks-list">
                            ${marksHtml}
                        </div>
                        <div class="total-line">Total: ${r.total}/500 &nbsp; | &nbsp; Avg: ${r.average}%</div>
                    </div>`;
            }).join('');
        }

        // ——— Logout ———
        function logout() {
            sessionStorage.removeItem('loggedInStudent');
            window.location.href = 'student_login.html';
        }

        // ——— Start ———
        init();
    </script>

</body>
</html>
